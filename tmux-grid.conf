# --- input latency / performance ---
set -g escape-time 0
set -g history-limit 5000
set -g status-interval 5
set -g assume-paste-time 1

set -g mouse on
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -s extended-keys on
set -as terminal-features ',*:clipboard:extkeys'
set -g set-clipboard on
set -g pane-border-status top
set -g pane-border-format " #{?@agent,#{@agent},#{pane_index}} "
# broadcast one prompt to all agents
bind e setw synchronize-panes on  \; display "BROADCAST: ON"
bind E setw synchronize-panes off \; display "BROADCAST: OFF"
# clear all agents
bind K run-shell "$HOME/.agent-grid/bin/clearall-do #{session_name}"
# Ctrl-Escape -> back to the grid (unzoom)
bind -n C-Escape select-window -t :0 \; if-shell -F '#{window_zoomed_flag}' 'resize-pane -Z'
# quick pane nav
bind -n M-Left select-pane -L ; bind -n M-Right select-pane -R
bind -n M-Up select-pane -U ; bind -n M-Down select-pane -D

# --- copy/paste (OSC52: tmux -> local clipboard) ---
set -g set-clipboard on
set -as terminal-features ',*:clipboard'
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel
